<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VetCare | Especialistas</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #F7EEE4;
            --ink: #3E3B38;
            --orange: #FF7B54;
            --orange-dark: #cc6243;
            --blue: #4A90E2;
            --font: 'Nunito', sans-serif;
            --radius: 30px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font); color: var(--ink); background: var(--bg); overflow-x: hidden; }

        nav { padding: 30px 10%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.8rem; font-weight: 900; color: var(--ink); display: flex; align-items: center; gap: 10px;}
        
        .emergency-btn { background: var(--orange); color: #fff; padding: 12px 24px; border-radius: 100px; font-weight: 800; text-decoration: none; display: flex; align-items: center; gap: 8px; box-shadow: 0 10px 20px rgba(255, 123, 84, 0.3); transition: 0.3s; animation: pulse 2s infinite; }
        .emergency-btn:hover { background: var(--orange-dark); transform: scale(1.05); }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 123, 84, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(255, 123, 84, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 123, 84, 0); } }

        .hero { display: flex; align-items: center; padding: 40px 10%; gap: 60px; min-height: 80vh; }
        .hero-text { flex: 1.2; }
        .hero-text h1 { font-size: 4.5rem; font-weight: 900; line-height: 1.1; margin-bottom: 20px; color: var(--ink); }
        .hero-text h1 span { color: var(--blue); }
        .hero-text p { font-size: 1.2rem; color: #666; margin-bottom: 40px; font-weight: 600; max-width: 500px;}
        
        .main-cta { font-size: 1.1rem; padding: 18px 40px; background: var(--ink); color: #fff; border-radius: 100px; font-weight: 800; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; transition: 0.3s;}
        .main-cta:hover { background: var(--blue); }

        .hero-img { flex: 1; position: relative; }
        .hero-img img { width: 100%; border-radius: var(--radius); transform: rotate(3deg); transition: 0.5s; box-shadow: 20px 20px 0px rgba(74, 144, 226, 0.2); }
        .hero-img:hover img { transform: rotate(0deg); }

        .services-bar { background: #fff; border-radius: 100px; padding: 20px 40px; display: flex; justify-content: space-between; margin: -50px 10% 50px; position: relative; z-index: 10; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        
        .srv-item { display: flex; align-items: center; gap: 15px; font-weight: 800; font-size: 1.1rem; color: var(--ink); }
        .icon-w { width: 50px; height: 50px; background: var(--bg); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: var(--blue);}

    </style>
</head>
<body>

    <nav>
        <div class="logo"><i data-lucide="paw-print" size="32" style="color:var(--orange)"></i> VetCare</div>
        <a href="#" class="emergency-btn"><i data-lucide="phone"></i> Urgencias 24h</a>
    </nav>

    <div class="hero">
        <div class="hero-text">
            <h1>Cuidamos a los miembros de <span>tu familia.</span></h1>
            <p>Atención veterinaria de alta especialidad, quirófano equipado y servicio de emergencias nocturnas para toda la región.</p>
            <a href="#" class="main-cta">Agendar Consulta <i data-lucide="calendar"></i></a>
        </div>
        <div class="hero-img">
            <img src="https://images.unsplash.com/photo-1543852786-1cf6624b9987?q=80&w=1500&auto=format&fit=crop" alt="Veterinaria">
        </div>
    </div>

    <div class="services-bar">
        <div class="srv-item">
            <div class="icon-w"><i data-lucide="stethoscope"></i></div>
            Consultas
        </div>
        <div class="srv-item">
            <div class="icon-w"><i data-lucide="activity"></i></div>
            Cirugía
        </div>
        <div class="srv-item">
            <div class="icon-w"><i data-lucide="moon"></i></div>
            Pensión
        </div>
        <div class="srv-item">
            <div class="icon-w"><i data-lucide="scissors"></i></div>
            Estética
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
