<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería | AURA</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .page-header {
            height: 50vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1544148103-0773bf10d330?q=80&w=2670&auto=format&fit=crop') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .gallery-wrap {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            grid-auto-rows: 250px;
            gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }
        
        .gallery-item.large {
            grid-column: span 2;
            grid-row: span 2;
        }
        
        .gallery-item.tall {
            grid-row: span 2;
        }
        
        .gallery-item.wide {
            grid-column: span 2;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: var(--transition);
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        .gallery-overlay i {
            color: var(--gold);
            font-size: 2rem;
            font-family: var(--font-serif);
        }
        
        @media (max-width: 768px) {
            .gallery-item.large,
            .gallery-item.tall,
            .gallery-item.wide {
                grid-column: span 1;
                grid-row: span 1;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar scrolled">
        <a href="index.html" class="logo">Aura</a>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="menu.html">Menú</a>
            <a href="servicios.html">Reservaciones</a>
            <a href="galeria.html" class="active">Galería</a>
            <a href="nosotros.html">Nosotros</a>
        </div>
    </nav>

    <header class="page-header">
        <div class="fade-in">
            <h1 style="font-size: 4rem; letter-spacing: 2px;">Galería Visual</h1>
            <p style="font-size: 1.2rem; margin-top: 15px;">Sumérgete en el mundo de AURA a través de nuestros platillos e instalaciones.</p>
        </div>
    </header>

    <section class="section">
        <div class="gallery-wrap fade-in">
            <div class="gallery-item large">
                <img src="https://images.unsplash.com/photo-1544025162-d76694265947?q=80&w=2669&auto=format&fit=crop" alt="Platillo Signature">
                <div class="gallery-overlay"><i>+</i></div>
            </div>
            
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1414235077428-338989a2e8c0?q=80&w=2670&auto=format&fit=crop" alt="Chef">
                <div class="gallery-overlay"><i>+</i></div>
            </div>
            
            <div class="gallery-item tall">
                <img src="https://images.unsplash.com/photo-1514933651103-005eec06c04b?q=80&w=2574&auto=format&fit=crop" alt="Interior">
                <div class="gallery-overlay"><i>+</i></div>
            </div>
            
            <div class="gallery-item wide">
                <img src="https://images.unsplash.com/photo-1550966871-3ed3cdb5ed0c?q=80&w=2670&auto=format&fit=crop" alt="Experiencia">
                <div class="gallery-overlay"><i>+</i></div>
            </div>
            
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=2670&auto=format&fit=crop" alt="Tataki">
                <div class="gallery-overlay"><i>+</i></div>
            </div>
            
            <div class="gallery-item tall">
                <img src="https://images.unsplash.com/photo-1559339352-11d035aa65de?q=80&w=2574&auto=format&fit=crop" alt="Vino">
                <div class="gallery-overlay"><i>+</i></div>
            </div>
            
            <div class="gallery-item wide">
                <img src="https://images.unsplash.com/photo-1512132411229-c30391241dd8?q=80&w=2670&auto=format&fit=crop" alt="Postres">
                <div class="gallery-overlay"><i>+</i></div>
            </div>
            
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1550547660-d9450f859349?q=80&w=2565&auto=format&fit=crop" alt="Mixologia">
                <div class="gallery-overlay"><i>+</i></div>
            </div>
        </div>
        <div style="text-align: center; margin-top: 50px;" class="fade-in">
            <a href="https://instagram.com" target="_blank" class="btn btn-filled">Ver Más en Instagram</a>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content" style="max-width: 1200px; margin: 0 auto;">
            <div class="footer-col">
                <h3 style="color: var(--gold); font-family: var(--font-serif);">AURA</h3>
                <p>Una experiencia culinaria que trasciende lo convencional.</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 AURA Restaurant.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
